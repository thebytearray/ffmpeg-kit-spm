name: Build and Publish SPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'SPM / GitHub release tag (e.g. v1.0.0)'
        required: true
        type: string
      ffmpeg_kit_ref:
        description: 'Git ref on arthenica/ffmpeg-kit (e.g. main or a release tag like full-gpl.v5.1.2.6)'
        required: true
        default: 'main'
        type: string

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      # Faster brew: skip implicit `brew update` on each invocation (cache already tracks formula changes via key).
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Bottle cache (~Library/Caches) + installed formulae (Cellar/opt) for Apple Silicon Homebrew under /opt/homebrew.
      # Bump key when dependencies change (workflow + build.sh brew list).
      - name: Cache Homebrew downloads and Cellar
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/opt
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/build-spm-release.yml', 'build.sh') }}
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-
            homebrew-${{ runner.os }}-
      - name: Set up Xcode
        run: echo "export DEVELOPER_DIR=$(xcode-select -p)" > ~/.xcode.for.ffmpeg.kit.sh
      - name: Install dependencies
        run: brew install autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget gettext meson ninja ragel groff gtk-doc docbook docbook-xsl libtasn1 gh --overwrite
      - name: Build and publish
        env:
          CI: true
          FFMPEG_KIT_TAG: ${{ inputs.tag }}
          FFMPEG_KIT_GIT_REF: ${{ inputs.ffmpeg_kit_ref }}
        run: ./build.sh
      - name: FFmpeg-Kit build.log (last 100 lines on failure)
        if: failure()
        run: |
          LOG="${{ github.workspace }}/.tmp/ffmpeg-kit/build.log"
          echo "======== Last 100 lines of $LOG (job failed) ========"
          if [[ -f "$LOG" ]]; then
            tail -n 100 "$LOG"
          else
            echo "(not found — failure may be before FFmpeg-Kit wrote this file.)"
          fi
          echo "======================================================"
