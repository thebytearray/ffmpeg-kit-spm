name: Build and Publish SPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. full-gpl.v6.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: brew install autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget gettext meson ninja ragel groff gtk-doc libtasn1 gh
      - name: Build and publish
        env:
          FFMPEG_KIT_TAG: ${{ inputs.tag }}
        run: ./build.sh
