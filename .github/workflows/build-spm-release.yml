name: Build and Publish SPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'SPM / GitHub release tag (e.g. v1.0.0)'
        required: true
        type: string
      ffmpeg_kit_ref:
        description: 'Git ref on arthenica/ffmpeg-kit (e.g. main or a release tag like full-gpl.v5.1.2.6)'
        required: true
        default: 'main'
        type: string

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.home }}/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/opt
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build-spm-release.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-
      - name: Set up Xcode
        run: echo "export DEVELOPER_DIR=$(xcode-select -p)" > ~/.xcode.for.ffmpeg.kit.sh
      - name: Install dependencies
        run: brew install autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget gettext meson ninja ragel groff gtk-doc docbook docbook-xsl libtasn1 gh --overwrite
      - name: Build and publish
        env:
          FFMPEG_KIT_TAG: ${{ inputs.tag }}
          FFMPEG_KIT_GIT_REF: ${{ inputs.ffmpeg_kit_ref }}
        run: ./build.sh
